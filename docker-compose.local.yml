# Bizkaia Connectivity – local development (DuckDB, no PostGIS)
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATA_SOURCE: local
      DATA_DIR: /data/serving
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ENVIRONMENT: local
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATA_DIR: /data
      SERVING_DIR: /data/serving
      ENVIRONMENT: local
      PYTHONPATH: /app/src
    volumes:
      - ./worker:/app
      - ./data:/data

  r5r:
    build:
      context: .
      dockerfile: docker/r5r.Dockerfile
    volumes:
      - ./data:/data
      - ./r5r/scripts:/r5r/scripts
      - ./r5r/config:/r5r/config
    profiles:
      - routing

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["pnpm", "dev", "--hostname", "0.0.0.0"]
