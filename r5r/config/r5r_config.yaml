# R5R configuration for Bizkaia Connectivity MVP

# Paths (inside Docker container)
data_path: /data/network
output_path: /data/output

# Origin/destination CSV files (exported by worker export-r5r command)
origins_csv: /data/network/origins.csv
destinations_csv: /data/network/destinations.csv

# Travel modes to evaluate
# TRANSIT includes walk access/egress to stops automatically via r5r.
modes:
  - TRANSIT

# Reference date (weekday within GTFS validity period)
departure_date: "2026-04-14"

# Time-of-day slots: single 08:00 AM peak slot to reduce computation costs.
departure_time_start: "08:00"
departure_time_end: "08:00"
departure_slot_interval_minutes: 30

# R5R time-window: for each slot, sample departures over this many minutes
# and take the requested percentile. 30 min aligns with the slot interval.
time_window_minutes: 30

# Maximum travel time in minutes
max_travel_time_minutes: 120

# Percentiles for travel time estimates within the time window
percentiles:
  - 50

# Walk parameters
walk_speed_kmh: 3.6
max_walk_distance_m: 2000

# R5R memory allocation
max_memory_mb: 4096
