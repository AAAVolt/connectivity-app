# Scoring parameters for the Bizkaia Connectivity MVP
#
# purpose_map: maps destination_types.code -> scoring purpose bucket
# impedance:   exp(-alpha * t) decay rates per (mode, purpose)
# diminishing:  concave transform exponent (0 < beta < 1)
# combined_weights: must sum to 1.0 across all (mode, purpose) pairs

# Identity mapping – each POI type is its own purpose bucket.
purpose_map:
  aeropuerto: aeropuerto
  bachiller: bachiller
  centro_educativo: centro_educativo
  centro_urbano: centro_urbano
  consulta_general: consulta_general
  hacienda: hacienda
  hospital: hospital
  osakidetza: osakidetza
  residencia: residencia
  universidad: universidad

impedance:
  TRANSIT:
    aeropuerto: 0.03
    bachiller: 0.03
    centro_educativo: 0.03
    centro_urbano: 0.03
    consulta_general: 0.03
    hacienda: 0.03
    hospital: 0.03
    osakidetza: 0.03
    residencia: 0.03
    universidad: 0.03

diminishing:
  beta: 0.7

max_travel_time: 120

# Equal weights across all POI types (TRANSIT only).
# The scoring engine dynamically normalises weights so that only types
# present in the data contribute and their effective weights sum to 1.0.
combined_weights:
  TRANSIT:
    aeropuerto: 0.10
    bachiller: 0.10
    centro_educativo: 0.10
    centro_urbano: 0.10
    consulta_general: 0.10
    hacienda: 0.10
    hospital: 0.10
    osakidetza: 0.10
    residencia: 0.10
    universidad: 0.10
